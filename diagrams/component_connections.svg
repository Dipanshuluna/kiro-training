<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1100" width="1500" height="1100">
<defs>
<filter id="sh"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/></filter>
<marker id="aR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#d32f2f"/></marker>
<marker id="aG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2e7d32"/></marker>
</defs>
<rect width="1500" height="1100" fill="#f8f9fa"/>
<rect width="1500" height="50" fill="#0d47a1"/>
<text x="750" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#fff">DETAILED COMPONENT CONNECTION DIAGRAM - PIN LEVEL WIRING</text>
<text x="750" y="44" text-anchor="middle" font-family="Arial" font-size="10" fill="#90caf9">Every wire and pin connection mapped | Color coded by function</text>

<!-- ======= ESP32 (CENTER) ======= -->
<g filter="url(#sh)">
<rect x="550" y="350" width="400" height="400" rx="15" fill="#0d47a1" stroke="#1a237e" stroke-width="2"/>
<rect x="570" y="370" width="360" height="360" rx="10" fill="#1565c0"/>
<text x="750" y="400" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">ESP32 DEVKIT V1</text>
<text x="750" y="418" text-anchor="middle" font-family="Arial" font-size="9" fill="#bbdefb">Dual Core 240MHz | WiFi 2.4GHz | BLE</text>
<!-- Left Pin Header -->
<rect x="580" y="440" width="150" height="270" rx="5" fill="#0d47a1" opacity="0.5"/>
<text x="655" y="458" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ffeb3b">LEFT PINS</text>
<text x="600" y="480" font-family="Courier" font-size="9" fill="#fff">3V3  ●━━━━━━</text>
<text x="600" y="500" font-family="Courier" font-size="9" fill="#fff">GND  ●━━━━━━</text>
<text x="600" y="520" font-family="Courier" font-size="9" fill="#fff">GPIO15●━━━━━━</text>
<text x="600" y="540" font-family="Courier" font-size="9" fill="#4caf50">GPIO34●━━━━━━ ← Opto Signal</text>
<text x="600" y="560" font-family="Courier" font-size="9" fill="#2196f3">GPIO35●━━━━━━ ← MQ-2 AO</text>
<text x="600" y="580" font-family="Courier" font-size="9" fill="#ffc107">GPIO32●━━━━━━ ← DHT11 DATA</text>
<text x="600" y="600" font-family="Courier" font-size="9" fill="#ff5722">GPIO25●━━━━━━ → Buzzer+</text>
<text x="600" y="620" font-family="Courier" font-size="9" fill="#f44336">GPIO26●━━━━━━ → LED Red</text>
<text x="600" y="640" font-family="Courier" font-size="9" fill="#4caf50">GPIO27●━━━━━━ → LED Green</text>
<text x="600" y="660" font-family="Courier" font-size="9" fill="#ffeb3b">GPIO14●━━━━━━ → LED Yellow</text>
<!-- Right Pin Header -->
<rect x="770" y="440" width="150" height="270" rx="5" fill="#0d47a1" opacity="0.5"/>
<text x="845" y="458" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ffeb3b">RIGHT PINS</text>
<text x="790" y="480" font-family="Courier" font-size="9" fill="#fff">VIN  ━━━━━━●</text>
<text x="790" y="500" font-family="Courier" font-size="9" fill="#fff">GND  ━━━━━━●</text>
<text x="790" y="520" font-family="Courier" font-size="9" fill="#00bcd4">GPIO21━━━━━━● → SDA(LCD)</text>
<text x="790" y="540" font-family="Courier" font-size="9" fill="#00bcd4">GPIO22━━━━━━● → SCL(LCD)</text>
<text x="790" y="560" font-family="Courier" font-size="9" fill="#fff">GPIO23━━━━━━●</text>
<text x="790" y="580" font-family="Courier" font-size="9" fill="#fff">GPIO19━━━━━━●</text>
<text x="790" y="600" font-family="Courier" font-size="9" fill="#fff">GPIO18━━━━━━●</text>
<!-- USB -->
<rect x="720" y="720" width="60" height="20" rx="3" fill="#ccc" stroke="#999"/>
<text x="750" y="734" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">USB</text>
<text x="750" y="705" text-anchor="middle" font-family="Arial" font-size="8" fill="#bbdefb">5V USB Power Input</text>
</g>

<!-- ======= AVANI LC MODULE (TOP) ======= -->
<g filter="url(#sh)">
<rect x="500" y="70" width="500" height="150" rx="12" fill="#b71c1c" stroke="#7f0000" stroke-width="2"/>
<text x="750" y="100" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#fff">RAVEL AVANI LC - Industrial Loop Controller</text>
<text x="750" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffcdd2">Addressable Fire Alarm | Powered by 24V DC | Proprietary Protocol</text>
<!-- Input terminals -->
<text x="530" y="145" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">INPUTS:</text>
<circle cx="530" cy="165" r="6" fill="#ff9800" stroke="#fff"/><text x="545" y="169" font-family="Arial" font-size="8" fill="#fff">Loop+ (Sensors)</text>
<circle cx="650" cy="165" r="6" fill="#ff9800" stroke="#fff"/><text x="665" y="169" font-family="Arial" font-size="8" fill="#fff">Loop- (Return)</text>
<!-- Output terminals -->
<text x="760" y="145" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">OUTPUTS:</text>
<circle cx="760" cy="170" r="7" fill="#f44336" stroke="#fff" stroke-width="1.5"/><text x="775" y="174" font-family="Arial" font-size="8" fill="#fff">FIRE (24V)</text>
<circle cx="860" cy="170" r="7" fill="#ff9800" stroke="#fff" stroke-width="1.5"/><text x="875" y="174" font-family="Arial" font-size="8" fill="#fff">FAULT (24V)</text>
<circle cx="950" cy="170" r="7" fill="#333" stroke="#fff" stroke-width="1.5"/><text x="965" y="174" font-family="Arial" font-size="8" fill="#fff">GND</text>
<!-- Status LEDs on board -->
<circle cx="540" cy="195" r="4" fill="#4caf50"/><circle cx="560" cy="195" r="4" fill="#f44336"/><circle cx="580" cy="195" r="4" fill="#ffeb3b"/>
<text x="600" y="199" font-family="Arial" font-size="7" fill="#ffcdd2">Status LEDs</text>
</g>

<!-- ======= OPTOCOUPLER PC817 (Between AVANI and ESP32) ======= -->
<g filter="url(#sh)">
<rect x="650" y="260" width="200" height="70" rx="8" fill="#37474f" stroke="#263238" stroke-width="1.5"/>
<text x="750" y="285" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">PC817 Optocoupler</text>
<text x="750" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#b0bec5">Electrical Isolation | 24V→3.3V</text>
<!-- Pins -->
<text x="670" y="320" font-family="Arial" font-size="7" fill="#ffab00">Pin1:Anode</text>
<text x="740" y="320" font-family="Arial" font-size="7" fill="#ffab00">Pin2:Cathode</text>
<text x="800" y="320" font-family="Arial" font-size="7" fill="#ffab00">Pin3:Emitter</text>
<text x="670" y="328" font-family="Arial" font-size="6" fill="#90a4ae">(From FIRE)</text>
<text x="740" y="328" font-family="Arial" font-size="6" fill="#90a4ae">(From GND)</text>
<text x="800" y="328" font-family="Arial" font-size="6" fill="#90a4ae">(To GPIO34)</text>
</g>

<!-- ======= MQ-2 SENSOR (LEFT) ======= -->
<g filter="url(#sh)">
<rect x="50" y="420" width="200" height="130" rx="12" fill="#4a148c" stroke="#311b92" stroke-width="1.5"/>
<text x="150" y="450" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">MQ-2 Smoke Sensor</text>
<text x="150" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#ce93d8">Gas/Smoke Detection Module</text>
<text x="70" y="495" font-family="Courier" font-size="9" fill="#fff">VCC ● ━━→ ESP32 3.3V</text>
<text x="70" y="512" font-family="Courier" font-size="9" fill="#2196f3">AO  ● ━━→ ESP32 GPIO35</text>
<text x="70" y="529" font-family="Courier" font-size="9" fill="#4caf50">DO  ● ━━→ AVANI Loop+</text>
<text x="70" y="546" font-family="Courier" font-size="9" fill="#333">GND ● ━━→ ESP32 GND</text>
</g>

<!-- ======= DHT11 SENSOR (LEFT) ======= -->
<g filter="url(#sh)">
<rect x="50" y="590" width="200" height="110" rx="12" fill="#01579b" stroke="#0d47a1" stroke-width="1.5"/>
<text x="150" y="618" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">DHT11 Temperature</text>
<text x="150" y="636" text-anchor="middle" font-family="Arial" font-size="8" fill="#81d4fa">Temp + Humidity Sensor</text>
<text x="70" y="660" font-family="Courier" font-size="9" fill="#fff">VCC  ● ━━→ ESP32 3.3V</text>
<text x="70" y="677" font-family="Courier" font-size="9" fill="#ffc107">DATA ● ━━→ ESP32 GPIO32</text>
<text x="70" y="694" font-family="Courier" font-size="9" fill="#333">GND  ● ━━→ ESP32 GND</text>
</g>

<!-- ======= BUZZER (RIGHT) ======= -->
<g filter="url(#sh)">
<rect x="1100" y="400" width="180" height="90" rx="12" fill="#bf360c" stroke="#8d2f04" stroke-width="1.5"/>
<text x="1190" y="428" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Piezo Buzzer</text>
<text x="1190" y="446" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffccbc">Active Buzzer 5V</text>
<text x="1120" y="470" font-family="Courier" font-size="9" fill="#ff5722">+ ● ←━━ ESP32 GPIO25</text>
<text x="1120" y="487" font-family="Courier" font-size="9" fill="#333">- ● ←━━ ESP32 GND</text>
</g>

<!-- ======= LEDs (RIGHT) ======= -->
<g filter="url(#sh)">
<rect x="1100" y="520" width="180" height="130" rx="12" fill="#1b5e20" stroke="#0d3b0d" stroke-width="1.5"/>
<text x="1190" y="545" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Status LEDs</text>
<text x="1190" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#a5d6a7">With 220ohm Resistors</text>
<circle cx="1130" cy="585" r="6" fill="#f44336"/><text x="1145" y="589" font-family="Courier" font-size="8" fill="#fff">RED   ←━ GPIO26 (FIRE)</text>
<circle cx="1130" cy="608" r="6" fill="#4caf50"/><text x="1145" y="612" font-family="Courier" font-size="8" fill="#fff">GREEN ←━ GPIO27 (OK)</text>
<circle cx="1130" cy="631" r="6" fill="#ffeb3b"/><text x="1145" y="635" font-family="Courier" font-size="8" fill="#fff">YELLOW←━ GPIO14 (FAULT)</text>
</g>

<!-- ======= LCD DISPLAY (RIGHT BOTTOM) ======= -->
<g filter="url(#sh)">
<rect x="1100" y="680" width="180" height="110" rx="12" fill="#004d40" stroke="#00251a" stroke-width="1.5"/>
<text x="1190" y="705" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">16x2 LCD (I2C)</text>
<text x="1190" y="720" text-anchor="middle" font-family="Arial" font-size="8" fill="#80cbc4">PCF8574 I2C Backpack</text>
<text x="1120" y="745" font-family="Courier" font-size="8" fill="#fff">VCC ● ←━━ ESP32 3.3V</text>
<text x="1120" y="762" font-family="Courier" font-size="8" fill="#00bcd4">SDA ● ←━━ ESP32 GPIO21</text>
<text x="1120" y="779" font-family="Courier" font-size="8" fill="#00bcd4">SCL ● ←━━ ESP32 GPIO22</text>
<text x="1120" y="796" font-family="Courier" font-size="8" fill="#333">GND ● ←━━ ESP32 GND</text>
</g>

