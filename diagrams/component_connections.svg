<g filter="url(#sh)">
<rect x="1150" y="80" width="200" height="100" rx="30" fill="#ff8f00" stroke="#e65100" stroke-width="2"/>
<text x="1250" y="115" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Firebase Cloud</text>
<text x="1250" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff3e0">Realtime Database</text>
<text x="1250" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">HTTP/HTTPS via WiFi</text>
<text x="1250" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">→ Dashboard + Alerts</text>
</g>

<!-- ======= 24V PSU (TOP LEFT) ======= -->
<g filter="url(#sh)">
<rect x="50" y="80" width="180" height="90" rx="8" fill="#424242" stroke="#212121" stroke-width="1.5"/>
<text x="140" y="108" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">24V DC Power Supply</text>
<text x="140" y="126" text-anchor="middle" font-family="Arial" font-size="8" fill="#bbb">AC Mains → 24V DC</text>
<text x="70" y="148" font-family="Courier" font-size="9" fill="#f44336">+24V ●━━→ AVANI LC VIN</text>
<text x="70" y="165" font-family="Courier" font-size="9" fill="#333">GND  ●━━→ AVANI LC GND</text>
</g>

<!-- ======= 5V USB (BOTTOM) ======= -->
<g filter="url(#sh)">
<rect x="600" y="830" width="300" height="60" rx="8" fill="#555" stroke="#333" stroke-width="1.5"/>
<text x="750" y="855" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">5V USB Power Adapter</text>
<text x="750" y="875" text-anchor="middle" font-family="Arial" font-size="8" fill="#bbb">USB-B Micro → ESP32 VIN (5V) + GND</text>
</g>

<!-- ======= WIRE CONNECTIONS ======= -->
<!-- 24V PSU to AVANI LC -->
<path d="M230,120 L495,120" fill="none" stroke="#f44336" stroke-width="3" marker-end="url(#aR)"/>
<path d="M230,140 L495,165" fill="none" stroke="#333" stroke-width="2.5" stroke-dasharray="6,3"/>
<text x="350" y="112" font-family="Arial" font-size="8" fill="#f44336" font-weight="bold">+24V (Red Wire)</text>
<text x="350" y="158" font-family="Arial" font-size="8" fill="#333">GND (Black Wire)</text>

<!-- AVANI FIRE output to Optocoupler Pin1 -->
<path d="M760,220 L710,258" fill="none" stroke="#ff5722" stroke-width="2.5" marker-end="url(#aR)"/>
<text x="700" y="242" font-family="Arial" font-size="7" fill="#ff5722">FIRE 24V</text>

<!-- AVANI GND to Optocoupler Pin2 -->
<path d="M950,177 C 950,240 790,250 770,258" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
<text x="870" y="235" font-family="Arial" font-size="7" fill="#333">GND</text>

<!-- Optocoupler Emitter to ESP32 GPIO34 -->
<path d="M750,330 L750,348" fill="none" stroke="#4caf50" stroke-width="3" marker-end="url(#aG)"/>
<text x="760" y="342" font-family="Arial" font-size="7" fill="#4caf50">3.3V Signal → GPIO34</text>

<!-- MQ-2 AO to ESP32 GPIO35 -->
<path d="M250,512 L548,558" fill="none" stroke="#2196f3" stroke-width="2.5" marker-end="url(#aG)"/>
<text x="370" y="528" font-family="Arial" font-size="8" fill="#2196f3" font-weight="bold">Analog Signal (Blue Wire)</text>

<!-- MQ-2 DO to AVANI Loop -->
<path d="M250,529 C 350,529 400,300 530,165" fill="none" stroke="#9c27b0" stroke-width="2" marker-end="url(#aR)"/>
<text x="310" y="390" font-family="Arial" font-size="7" fill="#9c27b0">Sensor Loop (Purple)</text>

<!-- DHT11 DATA to ESP32 GPIO32 -->
<path d="M250,677 C 400,677 500,620 548,578" fill="none" stroke="#ffc107" stroke-width="2.5" marker-end="url(#aG)"/>
<text x="350" y="660" font-family="Arial" font-size="8" fill="#f57f17" font-weight="bold">Digital Data (Yellow Wire)</text>

<!-- ESP32 to Buzzer -->
<path d="M950,598 L1097,450" fill="none" stroke="#ff5722" stroke-width="2.5" marker-end="url(#aR)"/>
<text x="1010" y="510" font-family="Arial" font-size="8" fill="#ff5722" font-weight="bold">GPIO25 (Orange)</text>

<!-- ESP32 to LEDs -->
<path d="M950,618 L1097,585" fill="none" stroke="#f44336" stroke-width="2"/>
<path d="M950,638 L1097,608" fill="none" stroke="#4caf50" stroke-width="2"/>
<path d="M950,658" fill="none" stroke="#ffc107" stroke-width="2"/>
<path d="M950,658 L1097,631" fill="none" stroke="#ffc107" stroke-width="2"/>

<!-- ESP32 I2C to LCD -->
<path d="M950,520 C 1050,550 1080,680 1097,740" fill="none" stroke="#00bcd4" stroke-width="2.5"/>
<text x="1020" y="640" font-family="Arial" font-size="8" fill="#00838f" font-weight="bold">I2C (Cyan)</text>

<!-- ESP32 WiFi to Firebase -->
<path d="M900,350 C 1000,250 1100,180 1147,135" fill="none" stroke="#ff8f00" stroke-width="2.5" stroke-dasharray="10,5" marker-end="url(#aR)"/>
<text x="1020" y="230" font-family="Arial" font-size="9" fill="#e65100" font-weight="bold">WiFi 2.4GHz</text>
<text x="1020" y="245" font-family="Arial" font-size="7" fill="#e65100">(HTTP to Firebase API)</text>

<!-- VCC lines (thin red) -->
<path d="M250,495 L548,480" fill="none" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4,2"/>
<path d="M250,660 L548,480" fill="none" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="380" y="482" font-family="Arial" font-size="7" fill="#f44336">3.3V (Red Dashed)</text>

<!-- GND lines -->
<path d="M250,546 L548,500" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/>
<path d="M250,694 L548,500" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="380" y="505" font-family="Arial" font-size="7" fill="#333">GND (Black Dashed)</text>

<!-- USB to ESP32 -->
<path d="M750,830 L750,745" fill="none" stroke="#666" stroke-width="3.5"/>
<text x="765" y="790" font-family="Arial" font-size="8" fill="#555">USB Cable</text>

<!-- ======= WIRE COLOR LEGEND ======= -->
<rect x="50" y="930" width="1400" height="150" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
<text x="750" y="955" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">WIRE COLOR CODE &amp; CONNECTION TABLE</text>

<!-- Row 1 -->
<line x1="80" y1="975" x2="120" y2="975" stroke="#f44336" stroke-width="3.5"/>
<text x="130" y="979" font-family="Arial" font-size="9" fill="#333">Red = +24V / +3.3V Power</text>
<line x1="350" y1="975" x2="390" y2="975" stroke="#333" stroke-width="3" stroke-dasharray="6,3"/>
<text x="400" y="979" font-family="Arial" font-size="9" fill="#333">Black Dashed = GND</text>
<line x1="600" y1="975" x2="640" y2="975" stroke="#ff5722" stroke-width="3"/>
<text x="650" y="979" font-family="Arial" font-size="9" fill="#333">Orange = FIRE Signal / Buzzer</text>
<line x1="900" y1="975" x2="940" y2="975" stroke="#4caf50" stroke-width="3"/>
<text x="950" y="979" font-family="Arial" font-size="9" fill="#333">Green = Opto Output (Safe 3.3V)</text>
<line x1="1200" y1="975" x2="1240" y2="975" stroke="#2196f3" stroke-width="3"/>
<text x="1250" y="979" font-family="Arial" font-size="9" fill="#333">Blue = Analog Data</text>

<!-- Row 2 -->
<line x1="80" y1="1000" x2="120" y2="1000" stroke="#ffc107" stroke-width="3"/>
<text x="130" y="1004" font-family="Arial" font-size="9" fill="#333">Yellow = Digital Data (DHT11)</text>
<line x1="350" y1="1000" x2="390" y2="1000" stroke="#9c27b0" stroke-width="3"/>
<text x="400" y="1004" font-family="Arial" font-size="9" fill="#333">Purple = Sensor Loop</text>
<line x1="600" y1="1000" x2="640" y2="1000" stroke="#00bcd4" stroke-width="3"/>
<text x="650" y="1004" font-family="Arial" font-size="9" fill="#333">Cyan = I2C Bus (SDA/SCL)</text>
<line x1="900" y1="1000" x2="940" y2="1000" stroke="#ff8f00" stroke-width="2.5" stroke-dasharray="8,4"/>
<text x="950" y="1004" font-family="Arial" font-size="9" fill="#333">Orange Dashed = WiFi (Wireless)</text>
<line x1="1200" y1="1000" x2="1240" y2="1000" stroke="#666" stroke-width="3.5"/>
<text x="1250" y="1004" font-family="Arial" font-size="9" fill="#333">Grey = USB Power Cable</text>

<!-- Connection Table -->
<text x="80" y="1035" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">COMPLETE PIN MAPPING:</text>
<text x="80" y="1055" font-family="Courier" font-size="9" fill="#333">ESP32 GPIO34 ← PC817 Emitter (Fire detect)  |  ESP32 GPIO35 ← MQ-2 AO (Smoke analog)  |  ESP32 GPIO32 ← DHT11 DATA (Temperature)</text>
<text x="80" y="1073" font-family="Courier" font-size="9" fill="#333">ESP32 GPIO25 → Buzzer (+)  |  ESP32 GPIO26 → Red LED (FIRE)  |  ESP32 GPIO27 → Green LED (OK)  |  ESP32 GPIO14 → Yellow LED (FAULT)</text>
<text x="80" y="1091" font-family="Courier" font-size="9" fill="#333">ESP32 GPIO21 → LCD SDA  |  ESP32 GPIO22 → LCD SCL  |  ESP32 3.3V → Sensors VCC  |  ESP32 GND → Common Ground  |  24V PSU → AVANI LC</text>

</svg>
