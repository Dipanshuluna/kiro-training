<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" width="1400" height="1000">
<defs>
<filter id="sh"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/></filter>
<marker id="aDown" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><polygon points="0 0,8 0,4 8" fill="#333"/></marker>
<marker id="aRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#333"/></marker>
<marker id="aDownR" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><polygon points="0 0,8 0,4 8" fill="#d32f2f"/></marker>
<marker id="aDownG" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><polygon points="0 0,8 0,4 8" fill="#2e7d32"/></marker>
<marker id="aDownO" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><polygon points="0 0,8 0,4 8" fill="#e65100"/></marker>
<marker id="aDownB" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><polygon points="0 0,8 0,4 8" fill="#1565c0"/></marker>
</defs>

<!-- Background -->
<rect width="1400" height="1000" fill="#fafafa"/>
<!-- Header -->
<rect width="1400" height="55" fill="#1b5e20"/>
<text x="700" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#fff">SYSTEM WORKING SEQUENCE - STEP BY STEP OPERATION</text>
<text x="700" y="48" text-anchor="middle" font-family="Arial" font-size="10" fill="#c8e6c9">How the fire alarm IoT system works from detection to alert - Timeline view</text>

<!-- ===== TIMELINE SPINE ===== -->
<line x1="700" y1="80" x2="700" y2="940" stroke="#bdbdbd" stroke-width="3"/>

<!-- ===== STEP 1: FIRE/SMOKE OCCURS ===== -->
<g filter="url(#sh)">
<rect x="100" y="85" width="500" height="80" rx="10" fill="#d32f2f"/>
<circle cx="700" cy="115" r="18" fill="#d32f2f" stroke="#fff" stroke-width="3"/>
<text x="700" y="120" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">1</text>
<text x="350" y="112" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">FIRE / SMOKE EVENT OCCURS</text>
<text x="350" y="132" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffcdd2">Smoke particles or heat rise detected in monitored zone</text>
<text x="350" y="150" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffcdd2">MQ-2 detects smoke (analog voltage rises) | DHT11 detects temperature spike</text>
</g>
<!-- Arrow down -->
<line x1="700" y1="133" x2="700" y2="175" stroke="#d32f2f" stroke-width="2.5" marker-end="url(#aDownR)"/>

<!-- ===== STEP 2: SENSORS TRIGGER ===== -->
<g filter="url(#sh)">
<rect x="780" y="175" width="520" height="80" rx="10" fill="#e65100"/>
<circle cx="700" cy="205" r="18" fill="#e65100" stroke="#fff" stroke-width="3"/>
<text x="700" y="210" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">2</text>
<text x="1040" y="200" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">SENSORS TRIGGER ALARM</text>
<text x="1040" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff3e0">MQ-2: Analog output (AO) voltage exceeds threshold (>2.5V)</text>
<text x="1040" y="238" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff3e0">MQ-2 Digital Out (DO) goes HIGH → Signal sent on AVANI LC sensor loop</text>
</g>
<line x1="700" y1="223" x2="700" y2="265" stroke="#e65100" stroke-width="2.5" marker-end="url(#aDownO)"/>

<!-- ===== STEP 3: AVANI LC PROCESSES ===== -->
<g filter="url(#sh)">
<rect x="100" y="265" width="500" height="95" rx="10" fill="#880e4f"/>
<circle cx="700" cy="300" r="18" fill="#880e4f" stroke="#fff" stroke-width="3"/>
<text x="700" y="305" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">3</text>
<text x="350" y="290" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">AVANI LC PROCESSES EVENT</text>
<text x="350" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#f8bbd0">Industrial controller receives sensor loop signal</text>
<text x="350" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#f8bbd0">Validates alarm condition (debounce, verification)</text>
<text x="350" y="346" text-anchor="middle" font-family="Arial" font-size="9" fill="#f8bbd0">FIRE output terminal goes HIGH (24V) | FIRE LED turns ON</text>
</g>
<line x1="700" y1="318" x2="700" y2="370" stroke="#880e4f" stroke-width="2.5" marker-end="url(#aDownR)"/>

<!-- ===== STEP 4: OPTOCOUPLER ISOLATES ===== -->
<g filter="url(#sh)">
<rect x="780" y="370" width="520" height="80" rx="10" fill="#37474f"/>
<circle cx="700" cy="400" r="18" fill="#37474f" stroke="#fff" stroke-width="3"/>
<text x="700" y="405" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">4</text>
<text x="1040" y="395" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">OPTOCOUPLER ISOLATION</text>
<text x="1040" y="415" text-anchor="middle" font-family="Arial" font-size="9" fill="#cfd8dc">PC817 receives 24V FIRE signal on Anode (through resistor)</text>
<text x="1040" y="433" text-anchor="middle" font-family="Arial" font-size="9" fill="#cfd8dc">Internal LED activates phototransistor → Emitter outputs 3.3V safe signal</text>
</g>
<line x1="700" y1="418" x2="700" y2="460" stroke="#37474f" stroke-width="2.5" marker-end="url(#aDown)"/>

<!-- ===== STEP 5: ESP32 DETECTS ===== -->
<g filter="url(#sh)">
<rect x="100" y="460" width="500" height="95" rx="10" fill="#0d47a1"/>
<circle cx="700" cy="495" r="18" fill="#0d47a1" stroke="#fff" stroke-width="3"/>
<text x="700" y="500" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">5</text>
<text x="350" y="487" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">ESP32 READS &amp; PROCESSES</text>
<text x="350" y="507" text-anchor="middle" font-family="Arial" font-size="9" fill="#bbdefb">GPIO34 reads HIGH from optocoupler → Fire event confirmed</text>
<text x="350" y="525" text-anchor="middle" font-family="Arial" font-size="9" fill="#bbdefb">GPIO35 reads MQ-2 analog value → Smoke level quantified</text>
<text x="350" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#bbdefb">GPIO32 reads DHT11 → Current temperature logged</text>
</g>
<line x1="700" y1="513" x2="700" y2="565" stroke="#0d47a1" stroke-width="2.5" marker-end="url(#aDownB)"/>

<!-- ===== STEP 6: LOCAL ALARM ACTIVATION ===== -->
<g filter="url(#sh)">
<rect x="780" y="565" width="520" height="80" rx="10" fill="#bf360c"/>
<circle cx="700" cy="595" r="18" fill="#bf360c" stroke="#fff" stroke-width="3"/>
<text x="700" y="600" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">6</text>
<text x="1040" y="590" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">LOCAL ALARM ACTIVATED</text>
<text x="1040" y="610" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffccbc">GPIO25 → HIGH → Buzzer sounds alarm continuously</text>
<text x="1040" y="628" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffccbc">GPIO26 → HIGH → Red LED ON | GPIO27 → LOW → Green LED OFF | LCD shows FIRE alert</text>
</g>
<line x1="700" y1="613" x2="700" y2="655" stroke="#bf360c" stroke-width="2.5" marker-end="url(#aDownR)"/>

<!-- ===== STEP 7: CLOUD DATA SENT ===== -->
<g filter="url(#sh)">
<rect x="100" y="655" width="500" height="80" rx="10" fill="#e65100"/>
<circle cx="700" cy="685" r="18" fill="#e65100" stroke="#fff" stroke-width="3"/>
<text x="700" y="690" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">7</text>
<text x="350" y="680" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">CLOUD ALERT SENT (WiFi)</text>
<text x="350" y="700" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff3e0">ESP32 connects to WiFi → Sends HTTP POST to Firebase Realtime DB</text>
<text x="350" y="718" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff3e0">Data: {status:"FIRE", temp:85, smoke:780, timestamp:"2025-01-15T14:30:00Z", zone:1}</text>
</g>
<line x1="700" y1="703" x2="700" y2="745" stroke="#e65100" stroke-width="2.5" marker-end="url(#aDownO)"/>

<!-- ===== STEP 8: DASHBOARD + NOTIFICATION ===== -->
<g filter="url(#sh)">
<rect x="780" y="745" width="520" height="80" rx="10" fill="#2e7d32"/>
<circle cx="700" cy="775" r="18" fill="#2e7d32" stroke="#fff" stroke-width="3"/>
<text x="700" y="780" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">8</text>
<text x="1040" y="770" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">DASHBOARD + NOTIFICATIONS</text>
<text x="1040" y="790" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8e6c9">Web dashboard updates in real-time (Firebase listener)</text>
<text x="1040" y="808" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8e6c9">Push notifications sent to registered mobile devices | Event logged with timestamp</text>
</g>
<line x1="700" y1="793" x2="700" y2="835" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#aDownG)"/>

<!-- ===== STEP 9: MONITORING CONTINUES ===== -->
<g filter="url(#sh)">
<rect x="100" y="835" width="500" height="80" rx="10" fill="#1565c0"/>
<circle cx="700" cy="865" r="18" fill="#1565c0" stroke="#fff" stroke-width="3"/>
<text x="700" y="870" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">9</text>
<text x="350" y="860" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">CONTINUOUS MONITORING</text>
<text x="350" y="880" text-anchor="middle" font-family="Arial" font-size="9" fill="#bbdefb">System continues monitoring | Sends periodic heartbeat to cloud every 30s</text>
<text x="350" y="898" text-anchor="middle" font-family="Arial" font-size="9" fill="#bbdefb">When fire clears: Buzzer OFF, Green LED ON, status updated to "NORMAL" in Firebase</text>
</g>

<!-- ===== TIMING INFO (Right side annotations) ===== -->
<rect x="20" y="940" width="1360" height="50" rx="8" fill="#fff" stroke="#e0e0e0"/>
<text x="700" y="960" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">RESPONSE TIMELINE</text>
<text x="700" y="978" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Step 1→3: ~1-3 sec (sensor + AVANI processing) | Step 4→6: ~50ms (ESP32 digital read + output) | Step 7→8: ~200-500ms (WiFi HTTP request) | Total: Under 5 seconds from fire to alert</text>

</svg>
